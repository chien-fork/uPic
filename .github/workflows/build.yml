name: Build and Release uPic

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*' # 当推送 v1.0.0, v2.1.0 等标签时触发 Release 流程
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Package Dependencies
        run: xcodebuild -resolvePackageDependencies -project uPic.xcodeproj

      - name: Build App
        # CODE_SIGNING_ALLOWED=NO 表示跳过正式签名
        run: |
          xcodebuild build \
            -project uPic.xcodeproj \
            -scheme "uPic(Release)" \
            -configuration Release \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package Artifact
        run: |
          mkdir -p output
          cp -R ./build/Build/Products/Release/uPic.app ./output/uPic.app
          cd output
          # 将应用打包成 ZIP
          zip -r uPic.zip uPic.app

      - name: Upload Artifact (Workflow)
        # 无论是否发布 Release，都会在 Actions 页面生成一个可下载的 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: uPic-unsigned
          path: output/uPic.zip

      - name: Create Release
        # 仅在推送标签（Tag）时运行
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: output/uPic.zip
          body: "uPic 自动编译版本 (未签名)"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
